<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL 2026 — All Teams</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#07111F;--navy2:#0d1c2e;--navy3:#152338;--white:#F0EDE8;--muted:#6a85a8;--card:#0f1e31;--accent:#F5A623}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

.hero{text-align:center;padding:48px 20px 20px;position:relative}
.hero::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:800px;height:380px;background:radial-gradient(ellipse,rgba(245,166,35,.13) 0%,transparent 68%);pointer-events:none;z-index:0}
.hero-inner{position:relative;z-index:1}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(245,166,35,.3);color:#F5A623;padding:5px 16px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,11vw,108px);line-height:.9;letter-spacing:2px;background:linear-gradient(175deg,#fff 15%,#F5A623 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{margin-top:10px;color:var(--muted);font-size:11px;letter-spacing:3px;text-transform:uppercase}

/* TEAM TABS */
.team-tabs-wrap{padding:28px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.team-tabs-wrap::-webkit-scrollbar{display:none}
.team-tabs{display:flex;gap:7px;min-width:max-content;margin:0 auto;justify-content:center;flex-wrap:wrap}
.team-tab{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:7px 16px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px}
.team-tab:hover{border-color:var(--team-color,#F5A623);color:var(--team-color,#F5A623)}
.team-tab.active{color:#000 !important;border-color:var(--team-color,#F5A623) !important;background:var(--team-color,#F5A623) !important}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:currentColor}

/* TEAM SECTION */
#teamSection{display:none}
.team-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:28px 30px 8px}
.team-name-wrap{}
.team-short{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,7vw,64px);letter-spacing:2px;line-height:1}
.team-full{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.team-stats{display:flex;gap:0;border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden}
.tstat{padding:12px 16px;text-align:center;border-right:1px solid rgba(255,255,255,.07)}
.tstat:last-child{border-right:none}
.tstat-n{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.tstat-l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:14px 28px 6px}
.fb{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:6px 15px;border-radius:50px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.active{background:var(--accent);border-color:var(--accent);color:#000}

/* SECTION LABEL */
.slabel{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;padding:20px 26px 10px;display:flex;align-items:center;gap:12px}
.slabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(245,166,35,.3),transparent)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:11px;padding:0 22px 6px}

/* CARD */
.card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:13px;overflow:hidden;transition:transform .25s,border-color .25s,box-shadow .25s;position:relative;animation:up .35s ease both}
.card:hover{transform:translateY(-5px);box-shadow:0 16px 36px rgba(0,0,0,.5)}
.cbadge{position:absolute;top:8px;right:8px;z-index:4;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;color:#000}
.av{position:relative;height:145px;background:linear-gradient(160deg,var(--navy3),var(--navy2));overflow:hidden;display:flex;align-items:center;justify-content:center}
.av::after{content:'';position:absolute;bottom:0;left:0;right:0;height:46px;background:linear-gradient(transparent,var(--card));pointer-events:none;z-index:2}
.av-ini{font-family:'Bebas Neue',sans-serif;font-size:48px;color:rgba(255,255,255,.08);z-index:1;user-select:none;position:absolute}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;z-index:3;transition:transform .4s}
.card:hover .av img{transform:scale(1.05)}
.cbody{padding:10px 12px 12px}
.cname{font-weight:600;font-size:12.5px;line-height:1.25;margin-bottom:4px}
.crole{font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:8px;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
.tbat{background:rgba(245,166,35,.1);color:#d4a055}
.tbowl{background:rgba(100,180,255,.08);color:#7aabdd}
.empty{grid-column:1/-1;text-align:center;padding:48px;color:var(--muted);font-size:13px}

/* LANDING */
#landing{padding:32px 20px;text-align:center}
.team-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;max-width:960px;margin:24px auto 0}
.team-card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px 16px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;text-align:center}
.team-card:hover{transform:translateY(-4px);box-shadow:0 14px 30px rgba(0,0,0,.4)}
.tc-dot{width:36px;height:36px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:#000;font-weight:800}
.tc-short{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;margin-bottom:4px}
.tc-full{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tc-count{font-size:10px;color:var(--muted);margin-top:8px}

footer{text-align:center;padding:36px 20px;color:rgba(255,255,255,.12);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.05);margin-top:28px}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:520px){
  .grid{grid-template-columns:repeat(2,1fr);padding:0 12px 6px;gap:9px}
  .team-header{padding:20px 14px 6px}
  .filters{padding:10px 14px 4px}
  .slabel{padding:16px 14px 8px}
  .team-stats{display:none}
}
</style>
</head>
<body>

function imgUrl(imageId,name){const slug=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');return `https://static.cricbuzz.com/a/img/v1/i1/c${imageId}/${slug}.jpg?d=low&p=gthumb`}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function shortBat(s){return s?.includes('Left')?'LHB':'RHB'}
function shortBowl(s){return s?s.split(' ').pop():null}

let activeTeam=null, activeRole='all';

// Build landing team cards
function buildLanding(){
  const grid=document.getElementById('teamCardsGrid');
  grid.innerHTML=TEAMS.map(t=>`
    <div class="team-card" style="border-color:${t.color}22" onclick="selectTeam('${t.key}')">
      <div class="tc-dot" style="background:${t.color}">${t.short}</div>
      <div class="tc-short" style="color:${t.color}">${t.short}</div>
      <div class="tc-full">${t.name}</div>
      <div class="tc-count">${t.players.length} players</div>
    </div>`).join('');
}

// Build team tabs
function buildTabs(){
  const tabs=document.getElementById('teamTabs');
  tabs.innerHTML=TEAMS.map(t=>`
    <button class="team-tab${activeTeam?.key===t.key?' active':''}"
      style="--team-color:${t.color}"
      onclick="selectTeam('${t.key}')">
      <span class="tdot" style="background:${t.color}"></span>${t.short}
    </button>`).join('');
}

function selectTeam(key){
  activeTeam=TEAMS.find(t=>t.key===key);
  activeRole='all';
  document.getElementById('landing').style.display='none';
  document.getElementById('teamSection').style.display='block';
  document.documentElement.style.setProperty('--accent', activeTeam.color);
  buildTabs();
  buildHeader();
  buildFilters();
  renderPlayers();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildHeader(){
  const t=activeTeam;
  const cats={Batters:0,'All Rounders':0,'Wicket Keepers':0,Bowlers:0};
  t.players.forEach(p=>cats[p.category]=(cats[p.category]||0)+1);
  document.getElementById('teamHeader').innerHTML=`
    <div class="team-name-wrap">
      <div class="team-short" style="color:${t.color}">${t.short}</div>
      <div class="team-full">${t.name}</div>
    </div>
    <div class="team-stats">
      <div class="tstat"><div class="tstat-n" style="color:${t.color}">${t.players.length}</div><div class="tstat-l">Players</div></div>
      <div class="tstat"><div class="tstat-n" style="color:${t.color}">${cats['Batters']||0}</div><div class="tstat-l">Batters</div></div>
      <div class="tstat"><div class="tstat-n" style="color:${t.color}">${cats['All Rounders']||0}</div><div class="tstat-l">All-rounders</div></div>
      <div class="tstat"><div class="tstat-n" style="color:${t.color}">${cats['Wicket Keepers']||0}</div><div class="tstat-l">Keepers</div></div>
      <div class="tstat"><div class="tstat-n" style="color:${t.color}">${cats['Bowlers']||0}</div><div class="tstat-l">Bowlers</div></div>
    </div>`;
}

function buildFilters(){
  const c=activeTeam.color;
  document.getElementById('roleFilters').innerHTML=
    ['all','Batters','All Rounders','Wicket Keepers','Bowlers'].map((r,i)=>
      `<button class="fb${activeRole===r?' active':''}"
        style="${activeRole===r?`background:${c};border-color:${c};color:#000`:''}"
        onclick="setRole('${r}')">${['All','Batters','All Rounders','Keepers','Bowlers'][i]}</button>`
    ).join('');
}

function setRole(r){activeRole=r;buildFilters();renderPlayers()}

function renderPlayers(){
  const t=activeTeam;
  const list=activeRole==='all'?t.players:t.players.filter(p=>p.category===activeRole);
  const cats=activeRole==='all'?['Batters','All Rounders','Wicket Keepers','Bowlers']:[activeRole];
  let html='',d=0;
  cats.forEach(cat=>{
    const g=list.filter(p=>p.category===cat);
    if(!g.length)return;
    html+=`<div class="slabel">${cat}</div><div class="grid">`;
    g.forEach(p=>{
      const url=imgUrl(p.imageId,p.name);
      const bat=p.battingStyle?`<span class="tag tbat">${shortBat(p.battingStyle)}</span>`:'';
      const bowl=p.bowlingStyle?`<span class="tag tbowl">${shortBowl(p.bowlingStyle)}</span>`:'';
      html+=`
      <div class="card" style="animation-delay:${d}ms">
        ${p.captain?`<div class="cbadge" style="background:${t.color}">C</div>`:''}
        <div class="av">
          <div class="av-ini">${ini(p.name)}</div>
          <img src="${url}" alt="${p.name}" loading="lazy"
            onerror="this.style.opacity='0'"
            onload="this.previousElementSibling.style.opacity='0'">
        </div>
        <div class="cbody">
          <div class="cname">${p.name}</div>
          <div class="crole">${p.role}</div>
          <div class="tags">${bat}${bowl}</div>
        </div>
      </div>`;
      d+=35;
    });
    html+='</div>';
  });
  document.getElementById('app').innerHTML=html||'<div class="grid"><div class="empty">No players found</div></div>';
}

buildLanding();
</script>
